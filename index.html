<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テキスト音読</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #1a1a2e;
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a3e;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; }
  .tab-bar {
    display: flex;
    background: #12121f;
    border-bottom: 1px solid #2a2a3e;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 0.85rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: #e94560;
    border-bottom-color: #e94560;
  }
  .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* テキスト入力タブ */
  .input-area { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 12px; overflow: hidden; }
  textarea {
    flex: 1;
    padding: 14px;
    border: 1px solid #2a2a3e;
    border-radius: 10px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 0.95rem;
    line-height: 1.8;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: #555; }
  .file-load {
    display: flex;
    gap: 8px;
  }
  .file-load label, .file-load button {
    flex: 1;
    padding: 12px;
    border: 1px dashed #3a3a5e;
    border-radius: 10px;
    background: #1a1a2e;
    color: #aaa;
    font-size: 0.85rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .file-load label:active, .file-load button:active { background: #222240; }
  .file-load input[type="file"] { display: none; }

  /* 再生タブ */
  .player { flex: 1; display: flex; flex-direction: column; }
  .text-display {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    font-size: 1rem;
    line-height: 2;
    -webkit-overflow-scrolling: touch;
  }
  .text-display .paragraph {
    margin-bottom: 1em;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.3s;
  }
  .text-display .paragraph.current {
    background: rgba(233, 69, 96, 0.15);
    border-left: 3px solid #e94560;
  }
  .text-display .section-title {
    font-weight: 700;
    font-size: 1.05rem;
    color: #e94560;
    margin: 16px 0 8px;
    padding: 4px 12px;
  }

  .player-controls {
    background: #1a1a2e;
    border-top: 1px solid #2a2a3e;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: #2a2a3e;
    border-radius: 2px;
    margin-bottom: 12px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: #e94560;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 12px;
  }
  .main-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .ctrl-btn {
    border: none;
    background: none;
    color: #ddd;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.2s;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .play-btn {
    width: 64px;
    height: 64px;
    background: #e94560;
    font-size: 1.6rem;
  }
  .play-btn:active { background: #c73a52; }
  .play-btn.speaking { background: #f5a623; }

  /* 設定タブ */
  .settings { padding: 20px; overflow-y: auto; flex: 1; }
  .setting-group {
    margin-bottom: 24px;
  }
  .setting-group h3 {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #1a1a2e;
  }
  .setting-item label { font-size: 0.9rem; }
  .setting-item .val { font-size: 0.85rem; color: #e94560; min-width: 40px; text-align: right; }
  input[type="range"] {
    width: 140px;
    accent-color: #e94560;
  }
  select {
    padding: 8px 12px;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 0.85rem;
    outline: none;
    max-width: 220px;
  }
  .status-msg {
    padding: 8px 20px;
    font-size: 0.8rem;
    color: #666;
    text-align: center;
  }

  /* クリアボタン */
  .clear-btn {
    padding: 10px 20px;
    border: 1px solid #e94560;
    border-radius: 8px;
    background: transparent;
    color: #e94560;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .clear-btn:active { background: rgba(233, 69, 96, 0.1); }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 0.95rem;
    text-align: center;
    padding: 40px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="header">
  <h1>テキスト音読</h1>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="input">テキスト入力</div>
  <div class="tab" data-tab="player">再生</div>
  <div class="tab" data-tab="settings">設定</div>
</div>

<!-- テキスト入力タブ -->
<div class="tab-content active" id="tab-input">
  <div class="input-area">
    <textarea id="textInput" placeholder="ここにテキストを貼り付け、または下のボタンからファイルを読み込み"></textarea>
    <div class="file-load">
      <label>
        <input type="file" id="fileInput" accept=".txt,.md,.text,text/plain">
        ファイルを読み込み
      </label>
      <button id="clearBtn" class="clear-btn">クリア</button>
    </div>
  </div>
</div>

<!-- 再生タブ -->
<div class="tab-content" id="tab-player">
  <div class="player">
    <div class="text-display" id="textDisplay">
      <div class="empty-state">テキスト入力タブで<br>テキストを入力してください</div>
    </div>
    <div class="player-controls">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <span id="currentPara">0 / 0</span>
        <span id="statusText">停止中</span>
      </div>
      <div class="main-controls">
        <button class="ctrl-btn" id="prevBtn" title="前の段落">&#9664;&#9664;</button>
        <button class="ctrl-btn play-btn" id="playBtn" title="再生">&#9654;</button>
        <button class="ctrl-btn" id="nextBtn" title="次の段落">&#9654;&#9654;</button>
      </div>
    </div>
  </div>
</div>

<!-- 設定タブ -->
<div class="tab-content" id="tab-settings">
  <div class="settings">
    <div class="setting-group">
      <h3>音声</h3>
      <div class="setting-item">
        <label>音声選択</label>
        <select id="voiceSelect"></select>
      </div>
    </div>
    <div class="setting-group">
      <h3>速度・ピッチ</h3>
      <div class="setting-item">
        <label>速度</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="rateSlider" min="0.3" max="2.5" step="0.1" value="1">
          <span class="val" id="rateVal">1.0</span>
        </div>
      </div>
      <div class="setting-item">
        <label>ピッチ</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1">
          <span class="val" id="pitchVal">1.0</span>
        </div>
      </div>
    </div>
    <div class="setting-group">
      <h3>表示</h3>
      <div class="setting-item">
        <label>文字サイズ</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="fontSlider" min="12" max="24" step="1" value="16">
          <span class="val" id="fontVal">16</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const synth = window.speechSynthesis;
let voices = [];
let paragraphs = [];
let currentIndex = 0;
let isPlaying = false;
let isPaused = false;

// DOM elements
const textInput = document.getElementById('textInput');
const fileInput = document.getElementById('fileInput');
const clearBtn = document.getElementById('clearBtn');
const textDisplay = document.getElementById('textDisplay');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const currentPara = document.getElementById('currentPara');
const statusText = document.getElementById('statusText');
const voiceSelect = document.getElementById('voiceSelect');
const rateSlider = document.getElementById('rateSlider');
const pitchSlider = document.getElementById('pitchSlider');
const rateVal = document.getElementById('rateVal');
const pitchVal = document.getElementById('pitchVal');
const fontSlider = document.getElementById('fontSlider');
const fontVal = document.getElementById('fontVal');

// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

    // 再生タブに切り替え時、テキストを反映
    if (tab.dataset.tab === 'player') {
      prepareText();
    }
  });
});

// 音声読み込み
function loadVoices() {
  voices = synth.getVoices();
  voiceSelect.innerHTML = '';
  const jaVoices = voices.filter(v => v.lang.startsWith('ja'));
  const otherVoices = voices.filter(v => !v.lang.startsWith('ja'));
  [...jaVoices, ...otherVoices].forEach(voice => {
    const opt = document.createElement('option');
    opt.value = voices.indexOf(voice);
    opt.textContent = voice.name + ' (' + voice.lang + ')';
    voiceSelect.appendChild(opt);
  });
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

// 設定スライダー
rateSlider.addEventListener('input', () => { rateVal.textContent = parseFloat(rateSlider.value).toFixed(1); saveSettings(); });
pitchSlider.addEventListener('input', () => { pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1); saveSettings(); });
fontSlider.addEventListener('input', () => {
  fontVal.textContent = fontSlider.value;
  textDisplay.style.fontSize = fontSlider.value + 'px';
  saveSettings();
});

// ファイル読み込み
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    textInput.value = ev.target.result;
    // 自動的に再生タブへ
    document.querySelector('[data-tab="player"]').click();
  };
  reader.readAsText(file, 'UTF-8');
});

// クリア
clearBtn.addEventListener('click', () => {
  textInput.value = '';
  stopSpeaking();
});

// テキストを段落に分割して表示
function prepareText() {
  const text = textInput.value.trim();
  if (!text) {
    textDisplay.innerHTML = '<div class="empty-state">テキスト入力タブで<br>テキストを入力してください</div>';
    paragraphs = [];
    updateProgress();
    return;
  }

  // 段落分割: 空行で分割、見出し(#)も区切り
  const lines = text.split('\n');
  paragraphs = [];
  let current = [];

  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed === '' || trimmed === '---') {
      if (current.length > 0) {
        paragraphs.push(current.join(' '));
        current = [];
      }
    } else if (trimmed.startsWith('#')) {
      if (current.length > 0) {
        paragraphs.push(current.join(' '));
        current = [];
      }
      // 見出しはそのまま段落として追加（#を除去）
      paragraphs.push('__HEADING__' + trimmed.replace(/^#+\s*/, ''));
    } else {
      current.push(trimmed);
    }
  });
  if (current.length > 0) paragraphs.push(current.join(' '));

  // 表示を生成
  textDisplay.innerHTML = '';
  paragraphs.forEach((p, i) => {
    const div = document.createElement('div');
    if (p.startsWith('__HEADING__')) {
      div.className = 'section-title';
      div.textContent = p.replace('__HEADING__', '');
      paragraphs[i] = p.replace('__HEADING__', ''); // 読み上げ用にクリーン
    } else {
      div.className = 'paragraph';
      div.textContent = p;
    }
    div.dataset.index = i;
    div.addEventListener('click', () => {
      stopSpeaking();
      currentIndex = i;
      highlightCurrent();
      speakCurrent();
    });
    textDisplay.appendChild(div);
  });

  // 表のパイプ記法行を除外（読み上げ不要）
  paragraphs = paragraphs.map(p => {
    if (p.startsWith('|') && p.includes('|')) {
      // テーブル行はそのまま読む（セル内容のみ抽出）
      return p.split('|').filter(c => c.trim() && !c.trim().match(/^[-:]+$/)).map(c => c.trim()).join('、');
    }
    return p;
  });

  currentIndex = 0;
  highlightCurrent();
  updateProgress();
}

function highlightCurrent() {
  textDisplay.querySelectorAll('.paragraph, .section-title').forEach(el => {
    el.classList.remove('current');
  });
  const current = textDisplay.querySelector('[data-index="' + currentIndex + '"]');
  if (current) {
    current.classList.add('current');
    current.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  updateProgress();
}

function updateProgress() {
  const total = paragraphs.length;
  if (total === 0) {
    progressFill.style.width = '0%';
    currentPara.textContent = '0 / 0';
    return;
  }
  progressFill.style.width = ((currentIndex + 1) / total * 100) + '%';
  currentPara.textContent = (currentIndex + 1) + ' / ' + total;
}

// 音声合成
function speakCurrent() {
  if (paragraphs.length === 0) return;
  synth.cancel();

  const text = paragraphs[currentIndex];
  if (!text || text.trim() === '') {
    // 空段落ならスキップ
    if (currentIndex < paragraphs.length - 1) {
      currentIndex++;
      highlightCurrent();
      speakCurrent();
    } else {
      finishPlaying();
    }
    return;
  }

  // 長いテキストを分割して読み上げ（ブラウザの制限対策）
  const chunks = splitText(text, 180);
  speakChunks(chunks, 0);
}

function splitText(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const chunks = [];
  let remaining = text;
  while (remaining.length > 0) {
    if (remaining.length <= maxLen) {
      chunks.push(remaining);
      break;
    }
    // 句読点で区切る
    let splitAt = -1;
    for (let i = maxLen; i >= maxLen / 2; i--) {
      if ('。、．，.!！?？'.includes(remaining[i])) {
        splitAt = i + 1;
        break;
      }
    }
    if (splitAt === -1) splitAt = maxLen;
    chunks.push(remaining.substring(0, splitAt));
    remaining = remaining.substring(splitAt);
  }
  return chunks;
}

function speakChunks(chunks, idx) {
  if (idx >= chunks.length) {
    // この段落の読み上げ完了 → 次の段落へ
    if (currentIndex < paragraphs.length - 1) {
      currentIndex++;
      highlightCurrent();
      speakCurrent();
    } else {
      finishPlaying();
    }
    return;
  }

  const utterance = new SpeechSynthesisUtterance(chunks[idx]);
  const selectedIndex = parseInt(voiceSelect.value);
  if (!isNaN(selectedIndex) && voices[selectedIndex]) {
    utterance.voice = voices[selectedIndex];
  }
  utterance.rate = parseFloat(rateSlider.value);
  utterance.pitch = parseFloat(pitchSlider.value);

  utterance.onend = () => {
    speakChunks(chunks, idx + 1);
  };
  utterance.onerror = (e) => {
    if (e.error !== 'canceled') {
      speakChunks(chunks, idx + 1);
    }
  };

  isPlaying = true;
  isPaused = false;
  playBtn.innerHTML = '&#10074;&#10074;';
  playBtn.classList.add('speaking');
  statusText.textContent = '再生中...';
  synth.speak(utterance);
}

function finishPlaying() {
  isPlaying = false;
  isPaused = false;
  playBtn.innerHTML = '&#9654;';
  playBtn.classList.remove('speaking');
  statusText.textContent = '完了';
}

function stopSpeaking() {
  synth.cancel();
  isPlaying = false;
  isPaused = false;
  playBtn.innerHTML = '&#9654;';
  playBtn.classList.remove('speaking');
  statusText.textContent = '停止中';
}

// 再生ボタン
playBtn.addEventListener('click', () => {
  if (paragraphs.length === 0) {
    prepareText();
    if (paragraphs.length === 0) return;
  }

  if (isPlaying && !isPaused) {
    // 一時停止
    synth.pause();
    isPaused = true;
    playBtn.innerHTML = '&#9654;';
    playBtn.classList.remove('speaking');
    statusText.textContent = '一時停止';
    return;
  }

  if (isPaused) {
    // 再開
    synth.resume();
    isPaused = false;
    playBtn.innerHTML = '&#10074;&#10074;';
    playBtn.classList.add('speaking');
    statusText.textContent = '再生中...';
    return;
  }

  // 新規再生
  speakCurrent();
});

// 前/次ボタン
prevBtn.addEventListener('click', () => {
  if (paragraphs.length === 0) return;
  stopSpeaking();
  currentIndex = Math.max(0, currentIndex - 1);
  highlightCurrent();
});

nextBtn.addEventListener('click', () => {
  if (paragraphs.length === 0) return;
  stopSpeaking();
  currentIndex = Math.min(paragraphs.length - 1, currentIndex + 1);
  highlightCurrent();
});

// プログレスバークリックで移動
progressBar.addEventListener('click', (e) => {
  if (paragraphs.length === 0) return;
  const rect = progressBar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const newIndex = Math.floor(ratio * paragraphs.length);
  stopSpeaking();
  currentIndex = Math.max(0, Math.min(paragraphs.length - 1, newIndex));
  highlightCurrent();
});

// 設定の保存/復元
function saveSettings() {
  localStorage.setItem('reader-settings', JSON.stringify({
    rate: rateSlider.value,
    pitch: pitchSlider.value,
    fontSize: fontSlider.value,
    voiceIndex: voiceSelect.value
  }));
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('reader-settings'));
    if (!s) return;
    rateSlider.value = s.rate || 1;
    pitchSlider.value = s.pitch || 1;
    fontSlider.value = s.fontSize || 16;
    rateVal.textContent = parseFloat(rateSlider.value).toFixed(1);
    pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1);
    fontVal.textContent = fontSlider.value;
    textDisplay.style.fontSize = fontSlider.value + 'px';
    if (s.voiceIndex) {
      setTimeout(() => { voiceSelect.value = s.voiceIndex; }, 500);
    }
  } catch(e) {}
}
loadSettings();

// テキストも保存（ページを離れても残す）
textInput.addEventListener('input', () => {
  localStorage.setItem('reader-text', textInput.value);
});
const savedText = localStorage.getItem('reader-text');
if (savedText) textInput.value = savedText;

// Chrome mobile対策: 長時間再生時に停止する問題への対処
setInterval(() => {
  if (synth.speaking && !synth.paused) {
    synth.pause();
    synth.resume();
  }
}, 10000);
</script>
</body>
</html>
